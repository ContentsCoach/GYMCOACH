<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE:GYM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: #F2F0EB;
            color: #1a1a1a;
            word-break: keep-all;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
        }

        .wrap {
            max-width: 420px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .category {
            font-size: 12px;
            font-weight: 500;
            color: #999;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .sub {
            font-size: 15px;
            font-weight: 500;
            color: #666;
            margin-bottom: 14px;
        }

        .title {
            font-size: 40px;
            font-weight: 900;
            line-height: 1.2;
            text-align: center;
            letter-spacing: -2px;
            margin-bottom: 48px;
        }

        .title em {
            font-style: normal;
            position: relative;
        }

        .title em::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 0;
            width: 100%;
            height: 10px;
            background: #E2D4B8;
            z-index: -1;
            border-radius: 2px;
        }

        .divider {
            width: 1px;
            height: 40px;
            background: #d0cdc8;
            margin-bottom: 20px;
        }

        .guide {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 32px;
        }

        /* 카드 */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-bottom: 44px;
        }

        .card {
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
            background: #fff;
        }

        .card:active { transform: scale(0.98); }

        .card-top {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 18px;
            position: relative;
            overflow: hidden;
        }

        /* 운영자: 다크 그라데이션 */
        .card-operator .card-top {
            background: radial-gradient(ellipse at 70% 20%, #3a3530 0%, #1a1815 100%);
        }

        /* 회원: 탄 베이지 */
        .card-member .card-top {
            background: #BFB090;
        }

        .card-en {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2.5px;
            color: rgba(255,255,255,0.35);
        }

        .card-bottom-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.75);
            width: fit-content;
            letter-spacing: 0.3px;
        }

        .card-title {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            line-height: 1.2;
            letter-spacing: -1px;
        }

        .card-body {
            padding: 16px 18px 18px;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-desc {
            font-size: 12px;
            color: #aaa;
            line-height: 1.7;
        }

        .card-type {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ccc;
        }

        /* 하단 링크 */
        .code-link {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a1a;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 4px;
            border-bottom: 1.5px solid #1a1a1a;
            transition: gap 0.2s ease;
        }

        .code-link:hover { gap: 14px; }
    </style>
</head>
<body>
    <div class="wrap">
        <span class="category">헬스장 · PT샵 · 필라테스</span>
        <p class="sub">회원은 지키고, 운영자는 돕습니다</p>
        <h1 class="title"><em>운영자</em>와 <em>회원</em>,<br>당신은 어느 쪽입니까?</h1>

        <div class="divider"></div>
        <p class="guide">해당하는 항목을 선택하세요.</p>

        <div class="cards">
            <a href="operator-list.html" class="card card-operator">
                <div class="card-top">
                    <div class="card-en">OPERATOR</div>
                    <div class="card-bottom-area">
                        <span class="card-tag">운영자 전용</span>
                        <div class="card-title">문의가<br>없습니다</div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-desc">문의가 없다면<br>반드시 알아야 할 것들</div>
                    <div class="card-type">GUIDE</div>
                </div>
            </a>
            <a href="user-list.html" class="card card-member">
                <div class="card-top">
                    <div class="card-en">MEMBER</div>
                    <div class="card-bottom-area">
                        <span class="card-tag">회원 전용</span>
                        <div class="card-title">속을까봐<br>걱정됩니다</div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-desc">등록 전에<br>반드시 알아야 할 것들</div>
                    <div class="card-type">GUIDE</div>
                </div>
            </a>
        </div>

        <a href="#" class="code-link">릴스에서 무료 코드 받기 →</a>
    </div>
</body>
</html>
