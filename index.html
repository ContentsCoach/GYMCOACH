<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>형이야마케터</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #ffffff; color: #111; line-height: 1.4; letter-spacing: -0.02em; word-break: keep-all; overflow: hidden; }
        a { text-decoration: none; color: inherit; cursor: pointer; }
        .wrapper { max-width: 800px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; justify-content: space-between; padding: 32px 24px 28px; text-align: center; }
        .highlight { background: linear-gradient(to top, rgba(255, 235, 59, 0.5) 45%, transparent 45%); padding: 0 2px; display: inline; }
        .header { }
        .sub-top { font-size: 15px; font-weight: 700; color: #444; letter-spacing: 0.04em; margin-bottom: 14px; display: block; }
        .main-title { font-size: clamp(32px, 9vw, 48px); font-weight: 900; line-height: 1.25; color: #000; letter-spacing: -0.03em; }
        .guide-text { font-size: 14px; color: #aaa; margin-top: 12px; font-weight: 400; display: block; }
        .card-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; flex: 1; align-items: center; margin: 16px 0; }
        .card { border-radius: 20px; padding: 28px 16px; height: 100%; max-height: 260px; transition: all 0.2s ease; border: 1px solid #eee; background-color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card:active { transform: scale(0.98); border-color: #ccc; }
        .card .label { font-weight: 700; font-size: 13px; margin-bottom: 10px; display: block; letter-spacing: 0.08em; }
        .card.operator .label { color: #3e5eff; }
        .card.user .label { color: #27ae60; }
        .card .status { font-size: 17px; font-weight: 700; color: #000; margin-bottom: 14px; letter-spacing: -0.02em; line-height: 1.35; }
        .card .detail { font-size: 13px; color: #333; font-weight: 500; line-height: 2; }
        .cta-wrap { display: flex; justify-content: center; padding-bottom: 4px; }
        .main-btn { display: inline-flex; align-items: center; gap: 12px; padding: 8px 4px; background: transparent; color: #000; font-size: 20px; font-weight: 700; border-bottom: 4px solid #000; transition: all 0.3s ease; }
        .main-btn .arrow { font-size: 24px; font-weight: 300; line-height: 1; }
        @media (max-width: 400px) { .main-title { font-size: 28px; } .card .status { font-size: 15px; } .card .detail { font-size: 12px; } .main-btn { font-size: 17px; } }
    </style>
</head>
<body>
<div class="wrapper">
    <header class="header">
        <span class="sub-top">헬스장 · PT샵 · 필라테스</span>
        <h1 class="main-title">
            <span class="highlight">운영자</span>와 <span class="highlight">회원</span>,<br>
            당신은 어느 쪽입니까?
        </h1>
        <span class="guide-text">해당하는 항목을 선택하세요.</span>
    </header>
    <div class="card-container">
        <a href="operator-list.html" class="card operator">
            <span class="label">운영자 전용</span>
            <h2 class="status">매출 안 늘어 고민이세요?</h2>
            <p class="detail">문의가 늘고<br>매출이 오르고<br>재등록이 되는<br>센터 운영법</p>
        </a>
        <a href="user-list.html" class="card user">
            <span class="label">회원 전용</span>
            <h2 class="status">피해볼까 걱정되세요?</h2>
            <p class="detail">무자격 트레이너<br>양아치 센터<br>환불 거부<br>완벽 대응법</p>
        </a>
    </div>
    <div class="cta-wrap">
        <a href="https://www.instagram.com/bromarketer?igsh=MTlhbWt3dmh4Y3V6bw%3D%3D&utm_source=qr" class="main-btn">
            <span>릴스에서 무료 코드 받기</span>
            <span class="arrow">→</span>
        </a>
    </div>
</div>
</body>
</html>
