<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>형이마케터</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* [수정] 한 페이지에 꽉 차도록 overflow 제어 */
        body { background-color: #ffffff; color: #111; line-height: 1.4; letter-spacing: -0.05em; word-break: keep-all; overflow: hidden; }
        a { text-decoration: none; color: inherit; cursor: pointer; }

        .wrapper {
            max-width: 800px; 
            margin: 0 auto; 
            height: 100dvh; /* [수정] 전체 높이를 화면에 맞춤 */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* [수정] 상중하 균등 배분 */
            padding: 40px 24px; /* [수정] 여백 최적화 */
            text-align: center; 
        }

        /* [수정] 요청에 따라 특정 부분만 형광펜 효과 적용 */
        .highlight {
            background: linear-gradient(to top, rgba(255, 235, 59, 0.5) 45%, transparent 45%);
            padding: 0 2px;
            display: inline;
        }

        .header { margin-bottom: 20px; }
        .sub-top { 
            font-size: 18px; 
            font-weight: 500; 
            color: #444; 
            margin-bottom: 8px; 
            display: block; 
        }
        /* 대상 텍스트는 형광펜 제외 */
        .sub-top .highlight { background: none; padding: 0; }

        .target { 
            font-size: 20px; 
            font-weight: 800; 
            color: #000; 
            margin-bottom: 16px; 
            display: block; 
        }
        .main-title { 
            font-size: clamp(28px, 8vw, 42px); /* [수정] 모바일에서 제목 크기 유동적 조절 */
            font-weight: 900; 
            line-height: 1.3; 
            color: #000; 
            letter-spacing: -1.8px; 
        }
        .guide-text { 
            font-size: 16px; 
            color: #777; 
            margin-top: 15px; 
            font-weight: 500; 
            display: block; 
        }

        /* 카드 섹션: 가로 배치 유지 */
        .card-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* [수정] 모바일에서도 가로 2열 유지 */
            gap: 12px; 
            flex: 1; /* [수정] 카드가 중앙 공간을 차지하도록 설정 */
            align-items: center;
            margin: 20px 0;
        }

        .card {
            border-radius: 20px; 
            padding: 30px 10px; /* [수정] 세로 배치를 위해 패딩 조정 */
            height: 100%;
            max-height: 280px; /* [수정] 한 페이지에 들어오도록 높이 제한 */
            transition: all 0.2s ease; 
            border: 1px solid #eee;
            background-color: #fff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card:active { transform: scale(0.98); border-color: #ccc; }
        
        .card .label { font-weight: 800; font-size: 14px; margin-bottom: 10px; display: block; letter-spacing: 0.05em; }
        .card.marketing .label { color: #3e5eff; } 
        .card.branding .label { color: #f2a900; }

        .card .status { font-size: 22px; font-weight: 800; margin-bottom: 12px; color: #000; }
        .card .detail { 
            font-size: 14px; 
            color: #555; 
            font-weight: 500; 
            line-height: 1.5; 
        }

        /* CTA 섹션 */
        .cta-wrap { 
            display: flex; 
            justify-content: center; 
            padding-bottom: 20px;
        }
        .main-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 8px 4px;
            background: transparent;
            color: #000; 
            font-size: 24px; 
            font-weight: 800; 
            border-bottom: 4px solid #000; 
            transition: all 0.3s ease;
        }
        .main-btn .arrow { font-size: 28px; font-weight: 300; line-height: 1; }

        /* 모바일 대응 미세조정 */
        @media (max-width: 400px) {
            .main-title { font-size: 26px; }
            .card .status { font-size: 18px; }
            .card .detail { font-size: 13px; }
            .main-btn { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <span class="sub-top"><span class="highlight">매출이 안 늘어 고민인</span></span>
        <span class="target">헬스장·PT샵·필라테스 사장님</span>
        <h1 class="main-title">
            지금 필요한 건<br>
            <span class="highlight">마케팅</span>입니까,<br>
            <span class="highlight">브랜딩</span>입니까?
        </h1>
        <span class="guide-text">현재 상황에 맞는 항목을 선택하세요.</span>
    </header>

    <div class="card-container">
        <a href="https://naver.me/FVSQeTYD" class="card marketing">
            <span class="label">MARKETING</span>
            <h2 class="status">노출 부족</h2>
            <p class="detail">검색이 안 되고<br>노출이 적고<br>문의 자체가<br>거의 없는 상태</p>
        </a>

        <a href="https://naver.me/FVSQeTYD" class="card branding">
            <span class="label">BRANDING</span>
            <h2 class="status">전환 문제</h2>
            <p class="detail">방문자는 있지만<br>문의가 적거나<br>상담 후 등록이<br>안 되는 상태</p>
        </a>
    </div>

    <div class="cta-wrap">
        <a href="https://naver.me/FVSQeTYD" class="main-btn">
            <span>내 센터 솔루션 진단받기</span>
            <span class="arrow">→</span>
        </a>
    </div>
</div>

</body>
</html>
