<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>형이야마케터</title>

<style>
/* 폰트 및 기본 리셋 */
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Pretendard', sans-serif;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    height: 100%;
    background: #000;
    color: #fff;
    overflow: hidden; /* 한 페이지에 고정 */
}

/* 전체 컨테이너를 화면 중앙에 배치 */
.container {
    max-width: 480px;
    height: 100%;
    margin: 0 auto;
    padding: 0 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* 섹션 간격 최적화 */
section {
    margin-bottom: 30px;
}

/* 상단 영역 */
.hero {
    text-align: center;
    margin-bottom: 30px;
}

.target {
    font-size: 15px;
    color: #FFD400;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 12px;
}

.hero h1 {
    font-size: 28px;
    line-height: 1.3;
    font-weight: 800;
    margin-bottom: 15px;
    letter-spacing: -0.5px;
}

.hero p {
    font-size: 15px;
    color: #888;
}

/* 카드 영역 (클릭 가능하도록 수정) */
.structure-grid {
    display: flex;
    gap: 12px;
}

.structure-card {
    flex: 1;
    background: #111;
    border-radius: 16px;
    padding: 24px 10px;
    border: 1px solid #222;
    text-align: center;
    text-decoration: none; /* 링크 밑줄 제거 */
    color: inherit;
    display: block;
    transition: all 0.2s ease;
}

/* 카드 클릭/호버 효과 */
.structure-card:active {
    transform: scale(0.96);
    background: #1a1a1a;
    border-color: #444;
}

.structure-card h3 {
    font-size: 18px;
    margin-bottom: 8px;
    font-weight: 700;
}

.structure-core {
    font-size: 16px;
    color: #FFD400;
    font-weight: 700;
    margin-bottom: 12px;
}

.structure-desc {
    font-size: 13px;
    color: #aaa;
    line-height: 1.6;
    word-break: keep-all;
}

/* 하단 버튼 영역 */
.cta {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 0 40px; 
}

.cta a {
    display: block;
    width: 100%;
    background: #FFD400;
    color: #000;
    text-align: center;
    padding: 18px;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 800;
    text-decoration: none;
    transition: background 0.2s;
}

.cta a:active {
    background: #e6bf00;
}

/* 기기 높이가 낮을 경우 대응 */
@media (max-height: 700px) {
    .hero h1 { font-size: 24px; }
    section { margin-bottom: 20px; }
    .structure-card { padding: 18px 10px; }
    .hero { margin-bottom: 20px; }
}
</style>
</head>

<body>

<div class="container">

    <section class="hero">
        <div class="target">
            매출이 안 늘어 고민인<br>
            헬스장·PT샵·필라테스 사장님
        </div>

        <h1>
            지금 필요한 건<br>
            마케팅입니까,<br>
            브랜딩입니까?
        </h1>

        <p>현재 상황에 맞는 항목을 선택하세요.</p>
    </section>

    <section class="structure">
        <div class="structure-grid">

            <a href="https://naver.me/FVSQeTYD" target="_blank" class="structure-card">
                <h3>마케팅</h3>
                <div class="structure-core">노출 부족</div>
                <div class="structure-desc">
                    검색이 안 되고<br>
                    노출이 적고<br>
                    문의 자체가 거의 없는 상태
                </div>
            </a>

            <a href="https://naver.me/FVSQeTYD" target="_blank" class="structure-card">
                <h3>브랜딩</h3>
                <div class="structure-core">전환 문제</div>
                <div class="structure-desc">
                    방문자는 있지만<br>
                    문의가 적거나<br>
                    상담 후 등록이 안 되는 상태
                </div>
            </a>

        </div>
    </section>

    <div class="cta">
        <a href="https://naver.me/FVSQeTYD" target="_blank">
            무료 진단 신청하기
        </a>
    </div>

</div>

</body>
</html>
