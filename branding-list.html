<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜딩 칼럼 리스트</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #fff; padding: 40px 24px; color: #111; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 32px; font-weight: 900; margin-bottom: 40px; text-align: center; letter-spacing: -0.05em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .column-card { border: 1px solid #eee; padding: 22px 16px; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .column-card:active { background: #f2faf6; transform: scale(0.98); border-color: #27ae60; }
        .tag { font-weight: 800; color: #27ae60; font-size: 13px; margin-bottom: 8px; display: block; }
        h3 { font-size: 16px; font-weight: 800; line-height: 1.4; word-break: keep-all; }
        .desc { color: #666; font-size: 13px; margin-top: 10px; line-height: 1.5; }
        .back-btn { display: block; text-align: center; margin-top: 40px; color: #888; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
<div class="container">
    <h1>브랜딩 인사이트</h1>

    <div class="grid">
        <div class="column-card" onclick="openColumn('branding1', '1234')">
            <span class="tag">BRANDING 01</span>
            <h3>소개글 바꿨더니 문의가 2배 됐습니다, 단어 3개만 바꿨어요</h3>
            <p class="desc">광고비는 그대로였어요. 주어 하나, 단어 3개만 바꿨더니 월 문의 4건에서 9건이 됐습니다.</p>
        </div>

        <div class="column-card" onclick="openColumn('branding2', '2234')">
            <span class="tag">BRANDING 02</span>
            <h3>상담 10분 만에 '생각해볼게요' 듣는 원장님, 공통점이 있습니다</h3>
            <p class="desc">상담 건수는 그대로인데 등록률이 25%에서 67%가 됐습니다. 구조만 바꿨어요.</p>
        </div>
    </div>

    <a href="index.html" class="back-btn">← 메인으로 돌아가기</a>
</div>
<script>
function openColumn(file, pwd) {
    const input = prompt("비공개 코드를 입력하세요.");
    if (input === pwd) {
        location.href = file + ".html";
    } else if (input !== null) {
        alert("코드가 올바르지 않습니다.");
    }
}
</script>
</body>
</html>
