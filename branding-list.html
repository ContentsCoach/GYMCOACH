<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜딩 칼럼 리스트</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #fff; padding: 40px 24px; color: #111; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 32px; font-weight: 900; margin-bottom: 40px; text-align: center; letter-spacing: -0.05em; }
        .column-card { border: 1px solid #eee; padding: 30px 20px; border-radius: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; }
        .column-card:active { background: #fffdf5; transform: scale(0.98); border-color: #f2a900; }
        .tag { font-weight: 800; color: #f2a900; font-size: 14px; margin-bottom: 8px; display: block; }
        h3 { font-size: 20px; font-weight: 800; line-height: 1.4; word-break: keep-all; }
        .desc { color: #666; font-size: 14px; margin-top: 10px; line-height: 1.5; }
        .back-btn { display: block; text-align: center; margin-top: 40px; color: #888; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
<div class="container">
    <h1>브랜딩 칼럼 리스트</h1>
    
    <div class="column-card" onclick="openColumn('branding-01', '1234')">
        <span class="tag">PAGE 2</span>
        <h3>리뷰 500개가 결제로 이어지지 않는 결정적 이유</h3>
        <p class="desc">숫자에만 집착하다 놓치는 신뢰의 본질. '3초의 법칙'을 아십니까?</p>
    </div>

    <a href="index.html" class="back-btn">← 메인으로 돌아가기</a>
</div>

<script>
function openColumn(file, pwd) {
    const input = prompt("비공개 코드를 입력하세요.");
    if (input === pwd) {
        location.href = file + ".html";
    } else if (input !== null) {
        alert("코드가 올바르지 않습니다.");
    }
}
</script>
</body>
</html>
